# Replace the password (and optionally username) before applying to a real cluster.
# For GitOps, prefer Sealed Secrets, External Secrets, or kubectl create secret instead of committing real values.
apiVersion: v1
kind: Secret
metadata:
  name: mongodb-credentials
  labels:
    app: mongodb
stringData:
  mongo-root-username: admin
  mongo-root-password: CHANGE_ME_USE_A_LONG_RANDOM_SECRET
