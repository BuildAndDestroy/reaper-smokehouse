apiVersion: apps/v1
kind: Deployment
metadata:
  name: reapers-smokehouse
  labels:
    app: reapers-smokehouse
spec:
  replicas: 3
  selector:
    matchLabels:
      app: reapers-smokehouse
  template:
    metadata:
      labels:
        app: reapers-smokehouse
    spec:
      containers:
      - name: reapers-smokehouse
        image: reapers-smokehouse:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3000
          name: http
        env:
        - name: PORT
          value: "3000"
        - name: NODE_ENV
          value: "production"
        # Same credentials as MongoDB root Secret (generated; see scripts/k8s-gen-mongodb-secret.sh).
        - name: MONGO_USERNAME
          valueFrom:
            secretKeyRef:
              name: mongodb-credentials
              key: mongo-root-username
        - name: MONGO_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mongodb-credentials
              key: mongo-root-password
        - name: MONGO_HOST
          value: "mongodb"
        - name: MONGO_PORT
          value: "27017"
        - name: MONGO_DATABASE
          value: "reapers_smokehouse"
        - name: MONGO_AUTH_SOURCE
          value: "admin"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3

